stages:
  - build
  - deploy

image: node:18

cache:
  paths:
    - node_modules/

build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - out/
    expire_in: 1 day

pages:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "Deploying to GitLab Pages..."
  artifacts:
    paths:
      - out
    expire_in: 30 days
  only:
    - main
